    <style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(90deg, #3f4a6b, #d88c8c, #e7c5c5, #f2f2f2, #9e9e9e);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-container {
    background: #fff;
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-container img {
    width: 120px;
    margin-bottom: 10px;
}

h2 {
    color: #3f4a6b;
}

.input-field {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 20px;
    background: #e7c5c5;
    outline: none;
}

.login-btn {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border: none;
    border-radius: 20px;
    background: #3f4a6b;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #d88c8c;
}

.options {
    margin-top: 10px;
    font-size: 13px;
    text-align: left;
}

.forgot {
    display: block;
    margin-top: 15px;
    font-size: 12px;
    color: #3f4a6b;
    text-decoration: none;
}

.message {
    margin-top: 10px;
    font-size: 13px;
    color: red;
}
</style>
</head>
<body>

<div class="login-container">
    <img src="logo.png" alt="Logo">
    <h2>Login</h2>

    <input type="text" id="username" class="input-field" placeholder="Username">
    <input type="password" id="password" class="input-field" placeholder="Password">

    <div class="options">
        <label><input type="checkbox" id="remember"> Stay logged in</label>
    </div>

    <button class="login-btn" onclick="login()">Login</button>
    <a href="#" class="forgot" onclick="forgot()">Forgot username / password?</a>

    <div id="msg" class="message"></div>
</div>

<script>
const correctUser = "admin";
const correctPass = "1234";

window.onload = () => {
    const savedUser = localStorage.getItem("user");
    if (savedUser) {
        document.getElementById("username").value = savedUser;
        document.getElementById("remember").checked = true;
    }
};

function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const remember = document.getElementById("remember").checked;
    const msg = document.getElementById("msg");

    msg.style.color = "red";

    if (!user || !pass) {
        msg.textContent = "Please fill in all fields.";
        return;
    }

    if (user === correctUser && pass === correctPass) {
        msg.style.color = "green";
        msg.textContent = "Login successful! Redirecting...";

        if (remember) {
            localStorage.setItem("user", user);
        } else {
            localStorage.removeItem("user");
        }

        setTimeout(() => {
            alert("Logged in!");
        }, 800);

    } else {
        msg.textContent = "Invalid username or password.";
    }
}

function forgot() {
    alert("Demo login:\nUsername: admin\nPassword: 1234");
}
</script>
